<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Post Instagram - Invitaciones Digitales</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #111;
            overflow: auto; /* Evitar que se corte si la pantalla es muy chica */
        }
        
        .ad-container {
            /* Tamaño optimizado para caber COMPLETO en la pantalla de laptop (16:9 vertical) */
            width: 360px;
            height: 640px; 
            /* Fondo Rapunzel (Cielo crepuscular morado a magenta mágico) */
            background: linear-gradient(135deg, #1f0b3b 0%, #462066 40%, #763073 70%, #ad5a7c 100%);
            position: relative;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            text-align: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            
            background-image: radial-gradient(circle at 80% 20%, rgba(255,255,255,0.8), transparent 40%),
                              radial-gradient(circle at 20% 80%, rgba(255,255,255,0.6), transparent 40%);
        }

        /* Adornos cósmicos */
        .bg-shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(40px);
            z-index: 1;
            animation: pulse-bg 6s infinite alternate ease-in-out;
        }
        .bg-shape1 { top: -50px; left: -50px; width: 200px; height: 200px; background: rgba(220, 160, 255, 0.7); }
        .bg-shape2 { bottom: -50px; right: -50px; width: 250px; height: 250px; background: rgba(255, 175, 200, 0.7); animation-delay: 2s; }

        /* FAROLILLOS MÁGICOS (Rapunzel) */
        .lantern {
            position: absolute;
            z-index: 2;
            width: 12px;
            height: 18px;
            background: linear-gradient(to bottom, #FFFDE7, #FFB300);
            border-radius: 2px;
            box-shadow: 0 0 15px 5px rgba(255, 179, 0, 0.5), inset 0 0 4px #fff;
            opacity: 0.8;
            animation: float-lantern 12s ease-in-out infinite;
        }

        .l1 { bottom: -5%; left: 10%; animation-delay: 0s; }
        .l2 { bottom: -10%; left: 35%; width: 15px; height: 22px; animation-duration: 15s; animation-delay: 3s; filter: blur(1px); }
        .l3 { bottom: 5%; right: 25%; animation-duration: 10s; animation-delay: 1s; }
        .l4 { bottom: -5%; right: 40%; width: 9px; height: 14px; animation-duration: 18s; animation-delay: 6s; filter: blur(2px); }
        .l5 { bottom: 20%; right: 10%; width: 14px; height: 20px; animation-duration: 14s; animation-delay: 4s; }
        .l6 { bottom: 10%; left: 20%; width: 10px; height: 15px; animation-duration: 16s; animation-delay: 5s; filter: blur(3px); }
        .l7 { bottom: -20%; right: 15%; width: 18px; height: 25px; animation-duration: 13s; animation-delay: 2s; }
        .l8 { bottom: 15%; left: 45%; animation-duration: 11s; animation-delay: 8s;}
        .l9 { bottom: 0%; right: 5%; width: 8px; height: 12px; animation-duration: 20s; animation-delay: 7s; filter: blur(1px); }
        .l10 { bottom: 5%; left: -5%; width: 14px; height: 20px; animation-duration: 15s; animation-delay: 1s; }

        /* Enjambre masivo de linternas extras */
        .l11 { bottom: -15%; left: 5%; width: 12px; height: 18px; animation-duration: 11s; animation-delay: 2s; filter: blur(2px); }
        .l12 { bottom: 5%; left: 15%; width: 8px; height: 12px; animation-duration: 17s; animation-delay: 5s; }
        .l13 { bottom: -5%; left: 25%; width: 14px; height: 21px; animation-duration: 14s; animation-delay: 8s; filter: blur(1px); }
        .l14 { bottom: 15%; left: 40%; width: 10px; height: 15px; animation-duration: 19s; animation-delay: 1s; }
        .l15 { bottom: -20%; left: 50%; width: 16px; height: 24px; animation-duration: 13s; animation-delay: 6s; }
        .l16 { bottom: 10%; right: 45%; width: 9px; height: 14px; animation-duration: 21s; animation-delay: 3s; filter: blur(2px); }
        .l17 { bottom: -10%; right: 30%; width: 13px; height: 19px; animation-duration: 16s; animation-delay: 0s; }
        .l18 { bottom: 5%; right: 20%; width: 11px; height: 16px; animation-duration: 12s; animation-delay: 7s; filter: blur(1px); }
        .l19 { bottom: -25%; right: 10%; width: 15px; height: 22px; animation-duration: 18s; animation-delay: 4s; }
        .l20 { bottom: 15%; right: 2%; width: 7px; height: 10px; animation-duration: 22s; animation-delay: 9s; filter: blur(3px); }
        .l21 { bottom: -5%; left: 2%; width: 12px; height: 18px; animation-duration: 14s; animation-delay: 11s; }
        .l22 { bottom: 20%; left: 30%; width: 10px; height: 15px; animation-duration: 17s; animation-delay: 10s; filter: blur(1px); }
        .l23 { bottom: -15%; right: 50%; width: 18px; height: 26px; animation-duration: 11s; animation-delay: 12s; }
        .l24 { bottom: 0%; right: 35%; width: 9px; height: 14px; animation-duration: 19s; animation-delay: 14s; filter: blur(2px); }
        .l25 { bottom: 10%; right: 15%; width: 13px; height: 20px; animation-duration: 15s; animation-delay: 13s; }

        @keyframes pulse-bg { 0% { transform: scale(1); } 100% { transform: scale(1.3); } }
        @keyframes float-lantern { 
            0% { transform: translate(0, 100px) rotate(-5deg); opacity: 0; } 
            30% { opacity: 0.9; } 
            70% { opacity: 0.7; }
            100% { transform: translate(30px, -450px) rotate(10deg); opacity: 0; } 
        }

        /* ----- CAJA AZUL (Arriba) ----- */
        .header { 
            position: relative; 
            z-index: 20; 
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding-top: 15px; /* Pegado hacia arriba */
        }
        
        .logo {
            width: 190px; /* Grande pero medido */
            height: auto;
            margin-top: -25px; /* Corta el espacio transparente de arriba de la imagen (Subiéndolo a la caja azul) */
            margin-bottom: -15px; /* Corta el espacio de abajo */
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
        }

        /* ----- CAJA AMARILLA (Textos Debajo) ----- */
        .main-title {
            margin-top: 0px; 
            font-size: 18px;
            font-weight: 800;
            color: #5B2B73;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 2px 5px rgba(255,255,255,0.9);
            line-height: 1;
        }
        
        .script-title {
            font-family: 'Great Vibes', cursive;
            font-size: 52px;
            color: #E26388;
            margin-top: -12px; 
            text-shadow: 2px 2px 3px rgba(255,255,255,1);
            transform: rotate(-3deg);
        }

        /* ----- ESPACIO FLEXIBLE MEDIO ----- */
        .middle-section {
            flex: 1; /* Esto toma TODO el espacio restante entre el texto y el botón */
            position: relative;
            width: 100%;
            margin-top: 10px;
        }

        /* ----- CAJA ROJA (Celular a la izquierda y gigante) ----- */
        .phone-mockup {
            width: 200px;
            height: 420px; /* Muy alto, llena la caja roja */
            background: #000;
            border-radius: 35px;
            border: 10px solid #222;
            box-shadow: 15px 15px 35px rgba(0,0,0,0.4);
            overflow: hidden; 
            
            /* Posicionado exactamente a la izquierda, debajo del texto (CAJA ROJA) */
            position: absolute;
            left: 20px; /* Pegado a la orilla izquierda */
            top: 0px; /* Pegado al texto de arriba */
            transform: rotate(-2deg);
            z-index: 5;
        }

        .phone-mockup img {
            width: 100%; 
            height: 100%;
            object-fit: cover; 
            position: absolute;
            top: 0; left: 0;
            border-radius: 25px; 
            z-index: 6; 
        }

        .phone-notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 90px;
            height: 22px;
            background: #222;
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
            z-index: 10; 
        }

        /* ----- BURBUJAS (A la derecha) ----- */
        .features {
            position: absolute;
            right: 10px; 
            top: 30px; /* Subimos el ancla para que quepan 5 burbujas */
            display: flex;
            flex-direction: column;
            gap: 12px; /* Reducimos ligeramente el espacio entre ellas */
            align-items: flex-end;
            z-index: 12;
        }

        .feature-pill {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            padding: 8px 12px;
            border-radius: 25px;
            font-size: 11px;
            font-weight: 800;
            color: #5B2B73;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 6px;
            animation: float-pill 3s ease-in-out infinite;
        }

        .feature-pill:nth-child(2) { animation-delay: 0.5s; right: 5px; position: relative;}
        .feature-pill:nth-child(3) { animation-delay: 1s; right: -5px; position: relative;}
        .feature-pill:nth-child(4) { animation-delay: 1.5s; right: 5px; position: relative;}
        .feature-pill:nth-child(5) { animation-delay: 2s; right: -5px; position: relative;}

        @keyframes float-pill {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-4px); }
            100% { transform: translateY(0px); }
        }

        .icon-circle {
            width: 22px;
            height: 22px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 10px;
        }

        /* ----- BOTÓN DE COTIZAR (Hasta Abajo) ----- */
        .footer-section {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 20px; /* Despegado del fondo */
            z-index: 25;
        }

        .cta-btn {
            background: linear-gradient(90deg, #E91E63, #FF4081); /* Fiusha vibrante */
            border: 2px solid #fff;
            padding: 10px 25px;
            border-radius: 40px;
            font-weight: 800;
            font-size: 14px;
            color: #ffffff; /* Letras blancas */
            box-shadow: 0 8px 25px rgba(233, 30, 99, 0.4);
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .cta-btn:hover { transform: scale(1.05); }

        .cta-whatsapp {
            color: #ffffff; /* Icono blanco para contrastar con fiusha */
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
